name: Cleanup Old Images

on:
  schedule:
    - cron: '0 0 * * *'  # Run daily at midnight
  workflow_dispatch:      # Allow manual run

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      # Delete commit-SHA images first (generated on every push by type=sha,format=long)
      - name: Delete old commit SHA images
        uses: snok/container-retention-policy@v3.0.1
        with:
          image-names: mempalace-viz
          cut-off: 30d
          account: user
          token: ${{ secrets.GITHUB_TOKEN }}
          image-tags: "sha-*,!*.*,!latest"

      - name: Delete old PR images
        uses: snok/container-retention-policy@v3.0.1
        with:
          image-names: mempalace-viz
          cut-off: 14d
          account: user
          token: ${{ secrets.GITHUB_TOKEN }}
          image-tags: "pr-*,sha-*,!*.*,!latest"
          keep-n-most-recent: 3

      - name: Delete old chore branch images
        uses: snok/container-retention-policy@v3.0.1
        with:
          image-names: mempalace-viz
          cut-off: 14d
          account: user
          token: ${{ secrets.GITHUB_TOKEN }}
          image-tags: "chore-*,sha-*,!*.*,!latest"
          keep-n-most-recent: 3

      - name: Delete old fix branch images
        uses: snok/container-retention-policy@v3.0.1
        with:
          image-names: mempalace-viz
          cut-off: 14d
          account: user
          token: ${{ secrets.GITHUB_TOKEN }}
          image-tags: "fix-*,sha-*,!*.*,!latest"
          keep-n-most-recent: 3

      - name: Delete old feat branch images
        uses: snok/container-retention-policy@v3.0.1
        with:
          image-names: mempalace-viz
          cut-off: 14d
          account: user
          token: ${{ secrets.GITHUB_TOKEN }}
          image-tags: "feat-*,sha-*,!*.*,!latest"
          keep-n-most-recent: 3

      - name: Delete old master branch images
        uses: snok/container-retention-policy@v3.0.1
        with:
          image-names: mempalace-viz
          cut-off: 90d
          account: user
          token: ${{ secrets.GITHUB_TOKEN }}
          image-tags: "master,sha-*,!*.*,!latest"
          keep-n-most-recent: 5

      - name: Collect platform manifest SHAs to protect
        id: protected
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAGGED=$(gh api "user/packages/container/mempalace-viz/versions" \
            --paginate \
            --jq '.[] | select(.metadata.container.tags | length > 0) | .name' \
            2>/dev/null || echo "")

          SKIP=""
          while IFS= read -r digest; do
            [ -z "$digest" ] && continue
            children=$(curl -sf \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.oci.image.index.v1+json,application/vnd.docker.distribution.manifest.list.v2+json" \
              "https://ghcr.io/v2/${{ github.repository_owner }}/mempalace-viz/manifests/$digest" \
              | python3 -c "import sys,json; d=json.load(sys.stdin); [print(m['digest']) for m in d.get('manifests',[])]" \
              2>/dev/null || true)
            [ -n "$children" ] && SKIP+="${children}"$'\n'
          done <<< "$TAGGED"

          SKIP_CSV=$(echo "$SKIP" | grep -v '^$' | sort -u | paste -sd,)
          echo "shas=$SKIP_CSV" >> $GITHUB_OUTPUT

      - name: Delete old untagged images
        uses: snok/container-retention-policy@v3.0.1
        with:
          image-names: mempalace-viz
          cut-off: 30d
          account: user
          token: ${{ secrets.GITHUB_TOKEN }}
          tag-selection: untagged
          skip-shas: ${{ steps.protected.outputs.shas }}
