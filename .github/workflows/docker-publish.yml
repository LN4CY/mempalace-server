name: Docker

on:
  push:
    branches: [ "master", "main" ]
    # Publish semver tags as releases.
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:      # Allow manual re-triggering to restore missing images
    inputs:
      version_override:
        description: 'Force a specific version tag (e.g., 1.0.0)'
        required: false
        type: string
      tag_as_latest:
        description: 'Also tag this build as latest'
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io
  # github.repository as <account>/<repo>
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      # This is used to complete the identity challenge
      # with sigstore/fulcio when running outside of PRs.
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # REQUIRED: Ensures MemPalace core logic is pulled for the build
          submodules: recursive

      # Set up QEMU for multi-arch builds (Arm64 for Pi)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        
      # Setup Docker Buildx
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Login against a Docker registry
      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Extract metadata (tags, labels) for Docker
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=${{ github.event.inputs.version_override }},enable=${{ github.event.inputs.version_override != '' }}
            type=raw,value=latest,enable=${{ github.event.inputs.tag_as_latest == 'true' }}
            type=sha,format=long

      # Build and push Docker image with Buildx (handles PRs securely)
      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v6
        with:
          context: .
          # Push only on non-PR events OR internal PRs
          push: ${{ github.event_name != 'pull_request' || github.repository == github.event.pull_request.head.repo.full_name }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Multi-arch support for Raspberry Pi (removed arm/v7 for speed)
          platforms: linux/amd64,linux/arm64
          # Enable GitHub Actions caching for Docker layers
          cache-from: type=gha
          cache-to: type=gha,mode=max
