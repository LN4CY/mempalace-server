name: Python Unit Tests

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # We need to install the production requirements first
        pip install -r requirements.txt
        # Then the test-only dependencies
        pip install -r requirements-dev.txt

    - name: Run tests with pytest
      run: |
        # We add . to PYTHONPATH to ensure the server module is found
        export PYTHONPATH=$PYTHONPATH:.
        pytest tests/ --junitxml=junit/test-results.xml --cov=./ --cov-report=xml --cov-report=html

    - name: Upload coverage reports
      id: upload-coverage
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: coverage-report
        path: htmlcov
